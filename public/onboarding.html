<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile | NearMe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .step-hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-[2.5rem] p-10 shadow-xl shadow-slate-200/50">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="flex items-center gap-2 text-3xl font-bold text-blue-600">
                <i data-lucide="map-pin" class="fill-current"></i>
                <span>NearMe</span>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="flex gap-2 mb-10">
            <div id="prog-1" class="h-1.5 flex-1 rounded-full bg-blue-600"></div>
            <div id="prog-2" class="h-1.5 flex-1 rounded-full bg-slate-100"></div>
            <div id="prog-3" class="h-1.5 flex-1 rounded-full bg-slate-100"></div>
        </div>

        <!-- Step 1: Bio -->
        <div id="step-1" class="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
            <h2 class="text-3xl font-black text-slate-900 leading-tight">Tell us about <br/>yourself.</h2>
            <p class="text-slate-500">Your bio helps people nearby get a sense of who you are.</p>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">Bio</label>
                <textarea id="bio-input" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition min-h-[120px]" placeholder="I'm a designer looking for lunch buddies..."></textarea>
                <div class="flex justify-between mt-2">
                    <span id="bio-error" class="text-xs text-red-500 hidden">Bio must be at least 10 chars.</span>
                    <span class="text-xs text-slate-400 ml-auto">Min 10 / Max 200</span>
                </div>
            </div>
            <button onclick="nextStep(2)" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition">Continue</button>
        </div>

        <!-- Step 2: Interests -->
        <div id="step-2" class="step-hidden space-y-6">
            <h2 class="text-3xl font-black text-slate-900 leading-tight">What are your <br/>passions?</h2>
            <p class="text-slate-500">Select at least 2 interests.</p>
            <div id="interests-grid" class="flex flex-wrap gap-2">
                <!-- JS populated -->
            </div>
            <div class="flex gap-4 pt-4">
                <button onclick="nextStep(1)" class="flex-1 font-bold text-slate-500 py-4">Back</button>
                <button onclick="nextStep(3)" class="flex-[2] bg-slate-900 text-white font-bold py-4 rounded-2xl">Almost there</button>
            </div>
        </div>

        <!-- Step 3: Preferences -->
        <div id="step-3" class="step-hidden space-y-6">
            <h2 class="text-3xl font-black text-slate-900 leading-tight">Setting the <br/>radar.</h2>
            
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">Looking For</label>
                <select id="looking-input" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none">
                    <option value="all">Everything</option>
                    <option value="friendship">Friendship</option>
                    <option value="networking">Networking</option>
                    <option value="dating">Dating</option>
                    <option value="collaboration">Collaboration</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest flex justify-between">
                    <span>Search Radius</span>
                    <span id="radius-val">5km</span>
                </label>
                <input type="range" id="radius-input" min="500" max="50000" step="500" value="5000" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-blue-600">
            </div>

            <div id="submit-error" class="text-sm text-red-500 hidden text-center font-medium"></div>

            <div class="flex gap-4 pt-4">
                <button onclick="nextStep(2)" class="flex-1 font-bold text-slate-500 py-4">Back</button>
                <button onclick="submitOnboarding()" id="submit-btn" class="flex-[2] bg-blue-600 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2">
                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                    Finish Setup
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const interests = ['Tech', 'Music', 'Coffee', 'Hiking', 'Gaming', 'Art', 'Design', 'Travel', 'Food', 'Startups', 'Fitness', 'Reading', 'Coding'];
        let selectedInterests = [];
        let currentStep = 1;

        const grid = document.getElementById('interests-grid');
        interests.forEach(i => {
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.className = 'px-4 py-2 rounded-xl border border-slate-200 text-slate-600 font-medium hover:border-blue-400 transition';
            btn.onclick = () => {
                if(selectedInterests.includes(i)) {
                    selectedInterests = selectedInterests.filter(x => x !== i);
                    btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
                } else {
                    selectedInterests.push(i);
                    btn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
                }
            };
            grid.appendChild(btn);
        });

        document.getElementById('radius-input').oninput = (e) => {
            document.getElementById('radius-val').textContent = (e.target.value / 1000) + 'km';
        };

        function nextStep(s) {
            if (s === 2 && document.getElementById('bio-input').value.length < 10) {
                document.getElementById('bio-error').classList.remove('hidden');
                return;
            }
            document.getElementById(`step-${currentStep}`).classList.add('step-hidden');
            document.getElementById(`step-${s}`).classList.remove('step-hidden');
            document.getElementById(`prog-${s}`).classList.replace('bg-slate-100', 'bg-blue-600');
            currentStep = s;
        }

        async function submitOnboarding() {
            const btn = document.getElementById('submit-btn');
            const err = document.getElementById('submit-error');
            
            if (selectedInterests.length < 2) {
                err.textContent = "Please select at least 2 interests.";
                err.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="animate-spin"></i> Saving...`;
            lucide.createIcons();

            try {
                const res = await fetch('/api/users/onboarding', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        bio: document.getElementById('bio-input').value,
                        interests: selectedInterests,
                        lookingFor: document.getElementById('looking-input').value,
                        searchRadius: parseInt(document.getElementById('radius-input').value),
                        isVisible: true
                    })
                });

                if (res.ok) window.location.href = '/app';
                else {
                    const data = await res.json();
                    err.textContent = data.error || "Update failed";
                    err.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = "Finish Setup";
                }
            } catch (e) {
                err.textContent = "Connection error.";
                err.classList.remove('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
