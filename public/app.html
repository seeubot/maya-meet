<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NearMe — Around you</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Socket.IO -->
  <script src="/socket.io/socket.io.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0d0d0d;
      --paper:  #f5f2eb;
      --amber:  #e8a020;
      --rust:   #c44b2b;
      --sage:   #4a7c59;
      --muted:  #7a7060;
      --panel:  #f0ede5;
      --border: rgba(13,13,13,0.12);
      --shadow: 0 4px 24px rgba(13,13,13,0.10);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--ink);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
      }
      .sidebar { display: none; }
      .sidebar.mobile-open { display: flex; position: fixed; inset: 0; z-index: 200; }
      .map-wrap { grid-row: 2; }
      .mobile-bar { display: flex !important; }
    }

    /* ── Topbar ── */
    .topbar {
      grid-column: 1 / -1;
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      z-index: 50;
    }

    .wordmark {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    .wordmark .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--amber);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.5); opacity: 0.6; }
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .online-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--sage);
      box-shadow: 0 0 0 3px rgba(74,124,89,0.2);
    }

    .avatar-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid var(--border);
      background: var(--ink);
      transition: border-color 0.2s;
      position: relative;
    }
    .avatar-btn:hover { border-color: var(--amber); }
    .avatar-btn img { width: 100%; height: 100%; object-fit: cover; }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--paper);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-head {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* Radius control */
    .radius-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .radius-control label {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    input[type="range"] {
      flex: 1;
      accent-color: var(--amber);
      height: 2px;
      cursor: pointer;
    }
    .radius-val {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--ink);
      min-width: 44px;
      text-align: right;
    }

    /* User list */
    .user-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .user-list::-webkit-scrollbar { width: 4px; }
    .user-list::-webkit-scrollbar-track { background: transparent; }
    .user-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .user-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
      animation: fadeSlide 0.35s ease both;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .user-item:hover { background: var(--panel); }
    .user-item.active { background: var(--panel); border-left: 3px solid var(--amber); }

    .ui-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--ink);
      position: relative;
    }
    .ui-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .ui-avatar .initials {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--paper);
    }
    .ui-online-dot {
      position: absolute;
      bottom: 1px; right: 1px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--sage);
      border: 2px solid var(--paper);
    }

    .ui-body { flex: 1; min-width: 0; }
    .ui-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ui-bio {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .ui-dist {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.72rem;
      color: var(--amber);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex: 1;
      padding: 48px 24px;
      color: var(--muted);
      text-align: center;
    }
    .empty-icon { font-size: 2.5rem; opacity: 0.4; }
    .empty-text { font-size: 0.85rem; line-height: 1.6; }

    /* ── Map ── */
    .map-wrap {
      position: relative;
      background: var(--ink);
    }

    #map {
      width: 100%; height: 100%;
    }

    /* Custom leaflet tile layer styling */
    .leaflet-container { background: #1a1814; }

    /* ── Profile drawer ── */
    .drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(13,13,13,0.5);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 340px;
      background: var(--paper);
      z-index: 301;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.77,0,0.175,1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .drawer.open { transform: translateX(0); }

    .drawer-close {
      position: absolute;
      top: 16px; right: 16px;
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      color: var(--muted);
      transition: border-color 0.2s, color 0.2s;
    }
    .drawer-close:hover { border-color: var(--ink); color: var(--ink); }

    .drawer-header {
      padding: 40px 28px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      gap: 20px;
    }
    .drawer-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--ink);
      position: relative;
    }
    .drawer-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .drawer-avatar .initials {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--paper);
    }

    .drawer-meta { flex: 1; min-width: 0; }
    .drawer-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -0.02em;
    }
    .drawer-dist {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 6px;
      font-size: 0.78rem;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--amber);
    }

    .drawer-body { padding: 24px 28px; overflow-y: auto; flex: 1; }
    .drawer-section { margin-bottom: 28px; }
    .drawer-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .drawer-bio {
      font-size: 0.92rem;
      line-height: 1.65;
      color: var(--ink);
    }

    .drawer-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .drawer-chip {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      border: 1px solid var(--border);
      padding: 5px 12px;
      color: var(--muted);
    }

    /* ── Me marker ── */
    .me-marker {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--amber);
      border: 3px solid white;
      box-shadow: 0 0 0 4px rgba(232,160,32,0.3);
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: var(--paper);
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 12px 24px;
      z-index: 500;
      transition: transform 0.3s cubic-bezier(0.77,0,0.175,1);
      pointer-events: none;
    }
    .toast.visible { transform: translateX(-50%) translateY(0); }

    /* ── Mobile bottom bar ── */
    .mobile-bar {
      display: none;
      background: var(--paper);
      border-top: 1px solid var(--border);
      padding: 12px 24px;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      z-index: 50;
    }
    .mobile-bar-btn {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 18px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--ink);
    }
    .mobile-bar-btn.primary {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    /* ── User menu dropdown ── */
    .user-menu {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 8px;
      background: var(--paper);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      min-width: 180px;
      display: none;
      z-index: 100;
    }
    .user-menu.open { display: block; }
    .user-menu-item {
      display: block;
      padding: 12px 18px;
      font-size: 0.85rem;
      color: var(--ink);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      transition: background 0.15s;
    }
    .user-menu-item:last-child { border-bottom: none; }
    .user-menu-item:hover { background: var(--panel); }
    .user-menu-item.danger { color: var(--rust); }
  </style>
</head>
<body>

  <div class="layout">
    <!-- ── Topbar ── -->
    <header class="topbar">
      <div class="wordmark">
        <div class="dot"></div>
        NearMe
      </div>
      <div class="topbar-right">
        <div class="online-badge">
          <div class="online-dot"></div>
          <span id="nearbyCount">0 nearby</span>
        </div>
        <div style="position:relative">
          <div class="avatar-btn" id="avatarBtn">
            <img id="topAvatar" src="" alt="" />
          </div>
          <div class="user-menu" id="userMenu">
            <span class="user-menu-item" style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.78rem;letter-spacing:.06em;cursor:default;color:var(--muted)" id="menuName">—</span>
            <a href="/onboarding" class="user-menu-item">Edit profile</a>
            <span class="user-menu-item danger" id="logoutBtn">Sign out</span>
          </div>
        </div>
      </div>
    </header>

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-title">People nearby</div>
        <div class="radius-control">
          <label for="radiusSlider">Radius</label>
          <input type="range" id="radiusSlider" min="500" max="10000" step="500" value="3000" />
          <span class="radius-val" id="radiusVal">3 km</span>
        </div>
      </div>
      <div class="user-list" id="userList">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">📍</div>
          <p class="empty-text">Waiting for your location…<br>Make sure location is enabled.</p>
        </div>
      </div>
    </aside>

    <!-- ── Map ── -->
    <div class="map-wrap">
      <div id="map"></div>
    </div>

    <!-- ── Mobile bottom bar ── -->
    <div class="mobile-bar">
      <button class="mobile-bar-btn" onclick="toggleSidebar()">People nearby</button>
      <button class="mobile-bar-btn primary" onclick="centerMap()">Re-center</button>
    </div>
  </div>

  <!-- ── Profile drawer ── -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <button class="drawer-close" onclick="closeDrawer()" aria-label="Close">✕</button>
    <div class="drawer-header">
      <div class="drawer-avatar" id="drawerAvatar">
        <div class="initials" id="drawerInitials"></div>
      </div>
      <div class="drawer-meta">
        <div class="drawer-name" id="drawerName"></div>
        <div class="drawer-dist" id="drawerDist"></div>
      </div>
    </div>
    <div class="drawer-body">
      <div class="drawer-section">
        <div class="drawer-label">About</div>
        <p class="drawer-bio" id="drawerBio">—</p>
      </div>
      <div class="drawer-section" id="drawerInterestsSection">
        <div class="drawer-label">Interests</div>
        <div class="drawer-chips" id="drawerChips"></div>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast"></div>

  <script>
    // ── State ────────────────────────────────────────────────────────────────
    let myCoords = null;
    let nearbyUsers = [];
    let map, myMarker;
    const userMarkers = new Map(); // userId → marker
    let activeUserId = null;
    let currentRadius = 3000;

    // ── Init ─────────────────────────────────────────────────────────────────
    (async () => {
      await loadMe();
      initMap();
      initSocket();
      startGeolocation();
    })();

    // ── Load current user ─────────────────────────────────────────────────────
    async function loadMe() {
      try {
        const res = await fetch('/auth/me');
        if (!res.ok) { window.location.href = '/'; return; }
        const user = await res.json();
        document.getElementById('topAvatar').src = user.avatar || '';
        document.getElementById('menuName').textContent = user.name || 'You';
      } catch(e) {}
    }

    // ── Map ───────────────────────────────────────────────────────────────────
    function initMap() {
      map = L.map('map', {
        center: [20, 0],
        zoom: 2,
        zoomControl: false,
        attributionControl: false,
      });

      // Dark tile layer
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_matter/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
      }).addTo(map);

      L.control.zoom({ position: 'bottomright' }).addTo(map);
      L.control.attribution({ position: 'bottomleft', prefix: '© CartoDB' }).addTo(map);
    }

    function centerMap() {
      if (myCoords) {
        map.setView([myCoords.lat, myCoords.lng], 15, { animate: true });
      }
    }

    // ── Geolocation ───────────────────────────────────────────────────────────
    function startGeolocation() {
      if (!navigator.geolocation) {
        showToast('Geolocation not supported');
        return;
      }
      navigator.geolocation.watchPosition(onPosition, onPositionError, {
        enableHighAccuracy: true,
        maximumAge: 10000,
        timeout: 15000,
      });
    }

    function onPosition(pos) {
      const { latitude: lat, longitude: lng } = pos.coords;
      const first = !myCoords;
      myCoords = { lat, lng };

      // Update or place my marker
      const meIcon = L.divIcon({ className: '', html: '<div class="me-marker"></div>', iconSize: [20,20], iconAnchor: [10,10] });
      if (!myMarker) {
        myMarker = L.marker([lat, lng], { icon: meIcon, zIndexOffset: 1000 }).addTo(map);
      } else {
        myMarker.setLatLng([lat, lng]);
      }

      if (first) {
        map.setView([lat, lng], 15, { animate: true });
      }

      // Emit to socket
      if (window._socket && window._socket.connected) {
        window._socket.emit('user:location', { lat, lng });
      }

      // Fetch nearby
      fetchNearby();
    }

    function onPositionError(err) {
      showToast('Location unavailable — ' + err.message);
    }

    // ── Socket.IO ─────────────────────────────────────────────────────────────
    function initSocket() {
      const socket = io({ transports: ['websocket', 'polling'] });
      window._socket = socket;

      socket.on('connect', () => {
        socket.emit('user:join');
      });

      socket.on('user:moved', ({ userId, lat, lng }) => {
        // Update marker if user is in our list
        const user = nearbyUsers.find(u => u._id === userId);
        if (!user) return;
        if (userMarkers.has(userId)) {
          userMarkers.get(userId).setLatLng([lat, lng]);
        }
        user.location = { type: 'Point', coordinates: [lng, lat] };
        renderList();
      });

      socket.on('user:online', ({ userId }) => {
        const user = nearbyUsers.find(u => u._id === userId);
        if (user) { user.isOnline = true; renderList(); }
      });

      socket.on('user:offline', ({ userId }) => {
        const user = nearbyUsers.find(u => u._id === userId);
        if (user) { user.isOnline = false; renderList(); }
      });
    }

    // ── Fetch nearby ──────────────────────────────────────────────────────────
    async function fetchNearby() {
      if (!myCoords) return;
      try {
        const res = await fetch(`/api/users/nearby?lat=${myCoords.lat}&lng=${myCoords.lng}&radius=${currentRadius}&limit=50`);
        if (!res.ok) return;
        nearbyUsers = await res.json();
        renderList();
        renderMarkers();
      } catch(e) {}
    }

    // ── Render sidebar list ───────────────────────────────────────────────────
    function renderList() {
      const list = document.getElementById('userList');
      const empty = document.getElementById('emptyState');
      document.getElementById('nearbyCount').textContent = `${nearbyUsers.length} nearby`;

      if (nearbyUsers.length === 0) {
        empty.style.display = 'flex';
        // Clear all non-empty items
        [...list.querySelectorAll('.user-item')].forEach(el => el.remove());
        empty.querySelector('.empty-text').innerHTML = myCoords
          ? 'No one nearby yet.<br>Be the first to explore!'
          : 'Waiting for your location…<br>Make sure location is enabled.';
        return;
      }

      empty.style.display = 'none';
      list.innerHTML = '';

      nearbyUsers.forEach((user, i) => {
        const dist = myCoords ? haversine(myCoords.lat, myCoords.lng,
          user.location?.coordinates[1], user.location?.coordinates[0]) : null;
        const distStr = dist !== null ? formatDist(dist) : '';

        const item = document.createElement('div');
        item.className = 'user-item' + (user._id === activeUserId ? ' active' : '');
        item.dataset.id = user._id;
        item.style.animationDelay = (i * 40) + 'ms';
        item.innerHTML = `
          <div class="ui-avatar">
            ${user.avatar ? `<img src="${esc(user.avatar)}" alt="" />` : `<div class="initials">${initials(user.name)}</div>`}
            ${user.isOnline ? '<div class="ui-online-dot"></div>' : ''}
          </div>
          <div class="ui-body">
            <div class="ui-name">${esc(user.name)}</div>
            <div class="ui-bio">${esc(user.bio || '—')}</div>
          </div>
          <div class="ui-dist">${distStr}</div>
        `;
        item.addEventListener('click', () => openProfile(user));
        list.appendChild(item);
      });
    }

    // ── Render map markers ────────────────────────────────────────────────────
    function renderMarkers() {
      const activeIds = new Set(nearbyUsers.map(u => u._id));

      // Remove stale markers
      for (const [id, marker] of userMarkers) {
        if (!activeIds.has(id)) {
          map.removeLayer(marker);
          userMarkers.delete(id);
        }
      }

      // Add/update markers
      nearbyUsers.forEach(user => {
        const coords = user.location?.coordinates;
        if (!coords) return;
        const [lng, lat] = coords;

        const html = `
          <div style="
            width:36px;height:36px;border-radius:50%;
            background:var(--ink);border:2px solid var(--amber);
            overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3)
          ">
            ${user.avatar
              ? `<img src="${esc(user.avatar)}" style="width:100%;height:100%;object-fit:cover" />`
              : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.75rem;color:var(--paper)">${initials(user.name)}</div>`
            }
          </div>
        `;
        const icon = L.divIcon({ className: '', html, iconSize: [36,36], iconAnchor: [18,18] });

        if (userMarkers.has(user._id)) {
          userMarkers.get(user._id).setLatLng([lat, lng]).setIcon(icon);
        } else {
          const marker = L.marker([lat, lng], { icon })
            .addTo(map)
            .on('click', () => openProfile(user));
          userMarkers.set(user._id, marker);
        }
      });
    }

    // ── Profile drawer ────────────────────────────────────────────────────────
    function openProfile(user) {
      activeUserId = user._id;

      // Highlight in list
      document.querySelectorAll('.user-item').forEach(el => {
        el.classList.toggle('active', el.dataset.id === user._id);
      });

      // Populate drawer
      document.getElementById('drawerName').textContent = user.name || '';
      document.getElementById('drawerBio').textContent = user.bio || '—';
      document.getElementById('drawerInitials').textContent = initials(user.name);

      const avatarEl = document.getElementById('drawerAvatar');
      const existing = avatarEl.querySelector('img');
      if (existing) existing.remove();
      if (user.avatar) {
        const img = document.createElement('img');
        img.src = user.avatar; img.alt = '';
        avatarEl.appendChild(img);
      }

      const dist = myCoords && user.location?.coordinates
        ? haversine(myCoords.lat, myCoords.lng, user.location.coordinates[1], user.location.coordinates[0])
        : null;
      document.getElementById('drawerDist').textContent = dist !== null ? `📍 ${formatDist(dist)} from you` : '';

      const chips = document.getElementById('drawerChips');
      const sec   = document.getElementById('drawerInterestsSection');
      chips.innerHTML = '';
      if (user.interests?.length) {
        sec.style.display = 'block';
        user.interests.forEach(i => {
          const chip = document.createElement('span');
          chip.className = 'drawer-chip';
          chip.textContent = i;
          chips.appendChild(chip);
        });
      } else {
        sec.style.display = 'none';
      }

      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawerOverlay').classList.add('open');

      // Pan map to user
      if (user.location?.coordinates) {
        map.panTo([user.location.coordinates[1], user.location.coordinates[0]], { animate: true });
      }
    }

    function closeDrawer() {
      activeUserId = null;
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawerOverlay').classList.remove('open');
      document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
    }

    // ── Radius slider ─────────────────────────────────────────────────────────
    const slider = document.getElementById('radiusSlider');
    const radiusVal = document.getElementById('radiusVal');
    slider.addEventListener('input', () => {
      currentRadius = parseInt(slider.value);
      radiusVal.textContent = currentRadius >= 1000 ? (currentRadius / 1000) + ' km' : currentRadius + ' m';
      clearTimeout(slider._t);
      slider._t = setTimeout(fetchNearby, 600);
    });

    // ── User menu ─────────────────────────────────────────────────────────────
    document.getElementById('avatarBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('userMenu').classList.toggle('open');
    });
    document.addEventListener('click', () => {
      document.getElementById('userMenu').classList.remove('open');
    });
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/auth/logout', { method: 'POST' });
      window.location.href = '/';
    });

    // ── Mobile sidebar toggle ─────────────────────────────────────────────────
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('mobile-open');
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function haversine(lat1, lng1, lat2, lng2) {
      if (lat2 == null || lng2 == null) return null;
      const R = 6371000;
      const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
      const Δφ = (lat2 - lat1) * Math.PI / 180;
      const Δλ = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function formatDist(m) {
      if (m < 1000) return Math.round(m) + ' m';
      return (m / 1000).toFixed(1) + ' km';
    }

    function initials(name) {
      if (!name) return '?';
      return name.split(' ').map(p => p[0]).slice(0, 2).join('').toUpperCase();
    }

    function esc(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('visible'), 3000);
    }
  </script>
</body>
</html>
