<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar | NearMe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .radar-pulse {
            position: relative;
        }
        .radar-pulse::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            background: #2563eb;
            border-radius: 50%;
            opacity: 0.4;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="min-h-screen flex flex-col lg:flex-row">
        <!-- Sidebar -->
        <aside class="hidden lg:flex flex-col w-72 bg-white border-r h-screen sticky top-0 p-8">
            <div class="flex items-center gap-2 text-2xl font-bold text-blue-600 mb-10">
                <i data-lucide="map-pin" class="fill-current"></i>
                <span>NearMe</span>
            </div>
            <nav class="space-y-2 flex-1">
                <a href="#" class="flex items-center gap-3 p-3 bg-blue-50 text-blue-700 font-bold rounded-xl">
                    <i data-lucide="compass" class="w-5 h-5"></i> Radar
                </a>
                <a href="#" class="flex items-center gap-3 p-3 text-slate-600 hover:bg-slate-50 rounded-xl transition">
                    <i data-lucide="users" class="w-5 h-5"></i> Connections
                </a>
                <a href="#" class="flex items-center justify-between p-3 text-slate-600 hover:bg-slate-50 rounded-xl transition">
                    <div class="flex items-center gap-3"><i data-lucide="message-square" class="w-5 h-5"></i> Messages</div>
                    <span class="bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded-full">3</span>
                </a>
                <a href="#" class="flex items-center gap-3 p-3 text-slate-600 hover:bg-slate-50 rounded-xl transition">
                    <i data-lucide="settings" class="w-5 h-5"></i> Settings
                </a>
            </nav>
            <div class="pt-6 border-t mt-auto">
                <div id="user-profile" class="flex items-center gap-3 mb-6">
                    <img id="my-avatar" src="" class="w-10 h-10 rounded-full border-2 border-blue-100 bg-slate-200">
                    <div class="overflow-hidden">
                        <p id="my-name" class="font-bold text-slate-800 truncate text-sm">Loading...</p>
                        <p id="my-email" class="text-[10px] text-slate-500 truncate">...</p>
                    </div>
                </div>
                <form action="/auth/logout" method="POST">
                    <button type="submit" class="flex items-center gap-2 text-red-500 font-bold text-sm hover:text-red-600">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Logout
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 lg:p-8 max-w-6xl mx-auto w-full">
            <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
                <div>
                    <h1 class="text-3xl font-black text-slate-900 tracking-tight">Radar</h1>
                    <p id="radius-label" class="text-slate-500">Finding users nearby...</p>
                </div>
                <div class="flex items-center gap-2 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200">
                    <button class="px-5 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold shadow-md shadow-blue-100">All</button>
                    <button class="px-5 py-2 text-slate-500 hover:bg-slate-50 rounded-xl text-sm font-bold">Social</button>
                    <button class="px-5 py-2 text-slate-500 hover:bg-slate-50 rounded-xl text-sm font-bold">Pro</button>
                </div>
            </header>

            <!-- Results Grid -->
            <div id="users-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                <!-- Skeletons -->
                <div class="bg-white p-6 rounded-[2rem] border animate-pulse">
                    <div class="w-20 h-20 bg-slate-100 rounded-2xl mb-4"></div>
                    <div class="h-4 w-1/2 bg-slate-100 rounded mb-2"></div>
                    <div class="h-3 w-3/4 bg-slate-100 rounded"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let socket;
        let currentUser;

        async function init() {
            // 1. Auth Check
            const res = await fetch('/auth/me');
            if(!res.ok) return window.location.href = '/';
            currentUser = await res.json();
            
            document.getElementById('my-name').textContent = currentUser.name;
            document.getElementById('my-email').textContent = currentUser.email;
            document.getElementById('my-avatar').src = currentUser.avatar;
            document.getElementById('radius-label').textContent = `Scanning within ${currentUser.searchRadius / 1000}km of your location`;
            
            // 2. Start Real-time
            socket = io();
            socket.emit('user:join');

            // 3. Start Geolocation
            startTracking();

            // 4. Load Nearby
            loadNearby();
            
            lucide.createIcons();
        }

        function startTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(updateLocation);
                setInterval(() => {
                    navigator.geolocation.getCurrentPosition(updateLocation);
                }, 30000);
            }
        }

        async function updateLocation(pos) {
            const { latitude: lat, longitude: lng } = pos.coords;
            await fetch('/api/users/location', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lat, lng })
            });
            socket.emit('user:location', { lat, lng });
        }

        async function loadNearby() {
            const res = await fetch('/api/users/nearby');
            const data = await res.json();
            renderUsers(data.users);
        }

        function renderUsers(users) {
            const grid = document.getElementById('users-grid');
            if (!users.length) {
                grid.innerHTML = `
                    <div class="col-span-full p-20 text-center">
                        <div class="radar-pulse w-4 h-4 bg-blue-600 rounded-full mx-auto mb-10"></div>
                        <h3 class="text-xl font-bold mb-2">No one on your radar</h3>
                        <p class="text-slate-500">Try expanding your search radius in settings.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = users.map(u => `
                <div class="bg-white rounded-[2.5rem] border border-slate-100 p-8 shadow-sm hover:shadow-xl hover:-translate-y-1 transition duration-300 group">
                    <div class="flex justify-between items-start mb-6">
                        <div class="relative">
                            <img src="${u.avatar}" class="w-20 h-20 rounded-3xl object-cover shadow-lg">
                            ${u.isOnline ? '<div class="absolute -bottom-1 -right-1 w-5 h-5 bg-green-500 border-4 border-white rounded-full"></div>' : ''}
                        </div>
                        <span class="text-[10px] font-black uppercase tracking-tighter text-slate-400 border border-slate-100 px-2 py-1 rounded-lg">
                            ${u.lookingFor}
                        </span>
                    </div>
                    <h3 class="text-xl font-bold text-slate-900 mb-1">${u.name}</h3>
                    <p class="text-xs text-slate-400 mb-4 flex items-center gap-1">
                        <i data-lucide="map-pin" class="w-3 h-3"></i> ${u.location?.city || 'Nearby'}
                    </p>
                    <p class="text-sm text-slate-600 line-clamp-2 mb-6 h-10">${u.bio}</p>
                    <div class="flex flex-wrap gap-1.5 mb-8">
                        ${u.interests.slice(0, 3).map(i => `
                            <span class="text-[9px] font-bold bg-slate-50 text-slate-500 px-2 py-1 rounded-md uppercase">${i}</span>
                        `).join('')}
                    </div>
                    <button class="w-full bg-blue-50 text-blue-600 font-bold py-4 rounded-2xl hover:bg-blue-600 hover:text-white transition-all flex items-center justify-center gap-2">
                        Connect
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
