<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>NearMe — find people around you</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-dark: #0a0c12;
  --bg-elevated: #101218;
  --bg-surface: #171b24;
  --bg-surface-hover: #1f2430;
  --border-subtle: rgba(255, 255, 255, 0.06);
  --border-medium: rgba(255, 255, 255, 0.1);
  --text-primary: #f0f3fa;
  --text-secondary: #9aa1b5;
  --text-muted: #5f677b;
  --accent-green: #2ecc71;
  --accent-green-dim: rgba(46, 204, 113, 0.12);
  --accent-blue: #3b82f6;
  --accent-blue-dim: rgba(59, 130, 246, 0.1);
  --danger: #ef4444;
  --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.4);
  --radius-card: 20px;
  --radius-pill: 100px;
  --transition-spring: cubic-bezier(0.2, 0.9, 0.4, 1.1);
  --safe-inset-top: env(safe-area-inset-top, 0px);
  --safe-inset-bottom: env(safe-area-inset-bottom, 0px);
  --safe-inset-left: env(safe-area-inset-left, 0px);
  --safe-inset-right: env(safe-area-inset-right, 0px);
  --nav-height: 64px;
  --sidebar-width: 320px;
  --mobile-sheet-height: 55vh;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* main app flex */
.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
}

/* --- sleek navigation --- */
.navbar {
  height: var(--nav-height);
  padding: 0 1.2rem;
  padding-left: calc(1.2rem + var(--safe-inset-left));
  padding-right: calc(1.2rem + var(--safe-inset-right));
  padding-top: var(--safe-inset-top);
  background: rgba(10, 12, 18, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 800;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Space Grotesk', monospace;
  font-weight: 700;
  font-size: 1.4rem;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #ffffff 0%, #a0b3d9 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.logo-badge {
  width: 10px;
  height: 10px;
  background: var(--accent-green);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--accent-green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.nav-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.icon-btn {
  background: rgba(23, 27, 36, 0.8);
  border: 1px solid var(--border-medium);
  border-radius: 40px;
  padding: 8px 14px;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.icon-btn svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}

.icon-btn:hover, .icon-btn:active {
  background: var(--bg-surface-hover);
  color: white;
  border-color: rgba(255,255,255,0.2);
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(145deg, var(--accent-green), #1e9c4e);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.9rem;
  color: #0a0c12;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.15);
  transition: transform 0.1s, box-shadow 0.2s;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.avatar:active { transform: scale(0.96); }

/* dropdown menu */
.dropdown-menu {
  position: fixed;
  top: calc(var(--nav-height) + 8px + var(--safe-inset-top));
  right: calc(1.2rem + var(--safe-inset-right));
  background: rgba(16, 18, 24, 0.98);
  backdrop-filter: blur(24px);
  border: 1px solid var(--border-medium);
  border-radius: 20px;
  padding: 8px;
  min-width: 180px;
  z-index: 1000;
  display: none;
  box-shadow: var(--shadow-md);
  animation: fadeScale 0.15s var(--transition-spring);
}

.dropdown-menu.open { display: block; }

@keyframes fadeScale {
  from { opacity: 0; transform: scale(0.94) translateY(-6px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.menu-item {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 10px 14px;
  background: transparent;
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
  border-radius: 14px;
  cursor: pointer;
  transition: background 0.12s;
}

.menu-item svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.8; }
.menu-item:hover { background: var(--bg-surface-hover); color: white; }
.menu-item.danger { color: var(--danger); }
.divider { height: 1px; background: var(--border-subtle); margin: 6px 0; }

/* main shell: auto flex between sidebar and map */
.app-shell {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* sidebar - desktop */
.sidebar {
  width: var(--sidebar-width);
  background: rgba(10, 12, 18, 0.92);
  backdrop-filter: blur(28px);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  z-index: 400;
  transition: transform 0.25s ease;
  overflow: hidden;
}

.sidebar-header {
  padding: 1.4rem 1.2rem 1rem;
  border-bottom: 1px solid var(--border-subtle);
}

.badge-title {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.counter {
  font-family: 'Space Grotesk', monospace;
  font-size: 2.1rem;
  font-weight: 700;
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.counter small {
  font-size: 0.85rem;
  font-weight: 400;
  color: var(--text-secondary);
}

.radius-control {
  margin-top: 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.radius-control span {
  font-size: 0.7rem;
  color: var(--text-muted);
}

input[type="range"] {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  background: var(--bg-surface);
  border-radius: 4px;
}

input[type="range"]:focus { outline: none; }
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  background: var(--accent-green);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 8px var(--accent-green);
  border: 2px solid #0a0c12;
}

.radius-value {
  font-family: monospace;
  font-size: 0.75rem;
  color: var(--accent-green);
  min-width: 55px;
  text-align: right;
}

/* user list */
.user-list {
  flex: 1;
  overflow-y: auto;
  padding: 0.5rem 0;
  scrollbar-width: thin;
}

.user-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0.9rem 1.2rem;
  border-bottom: 1px solid var(--border-subtle);
  cursor: pointer;
  transition: background 0.15s;
}

.user-item:hover, .user-item:active { background: var(--bg-surface); }
.user-item.highlighted { background: var(--accent-green-dim); border-left: 3px solid var(--accent-green); }

.user-avatar {
  width: 48px;
  height: 48px;
  border-radius: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.9rem;
  color: white;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  background: #2c3e66;
}

.online-indicator {
  position: absolute;
  bottom: 2px;
  right: 2px;
  width: 12px;
  height: 12px;
  background: var(--accent-green);
  border-radius: 50%;
  border: 2px solid var(--bg-dark);
  box-shadow: 0 0 6px var(--accent-green);
}

.user-details {
  flex: 1;
  min-width: 0;
}

.user-name {
  font-weight: 600;
  font-size: 0.9rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.user-bio {
  font-size: 0.7rem;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}

.tags {
  display: flex;
  gap: 6px;
  margin-top: 5px;
  flex-wrap: wrap;
}

.tag-pill {
  background: var(--bg-surface);
  border-radius: 40px;
  padding: 2px 8px;
  font-size: 0.6rem;
  font-weight: 500;
  color: var(--text-secondary);
}

.tag-pill.shared {
  background: var(--accent-green-dim);
  color: var(--accent-green);
}

.distance {
  font-family: monospace;
  font-size: 0.65rem;
  color: var(--text-muted);
  flex-shrink: 0;
}

.empty-state {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

/* map container */
.map-wrap {
  flex: 1;
  position: relative;
  background: #03060c;
}

#map {
  width: 100%;
  height: 100%;
}

.leaflet-tile-pane {
  filter: brightness(0.45) saturate(0.3) contrast(1.1);
}

.leaflet-control-attribution,
.leaflet-control-zoom {
  display: none !important;
}

/* custom map controls */
.map-fab {
  position: absolute;
  bottom: 1.5rem;
  right: 1rem;
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.fab-btn {
  width: 52px;
  height: 52px;
  background: rgba(18, 22, 30, 0.9);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-medium);
  border-radius: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.18s;
  color: var(--text-secondary);
}

.fab-btn svg {
  width: 22px;
  height: 22px;
  stroke: currentColor;
  stroke-width: 1.8;
}

.fab-btn.primary {
  background: var(--accent-green);
  color: #0a0c12;
  box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
}

.fab-btn:active { transform: scale(0.94); }

.location-banner {
  position: absolute;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(16px);
  border-radius: 48px;
  padding: 0.7rem 1.2rem;
  display: flex;
  gap: 12px;
  align-items: center;
  z-index: 500;
  border: 1px solid var(--border-medium);
  white-space: nowrap;
  font-size: 0.8rem;
}

.location-banner button {
  background: var(--accent-green);
  border: none;
  padding: 5px 14px;
  border-radius: 40px;
  font-weight: 600;
  color: #0a0c12;
  cursor: pointer;
}

/* profile panel (right slide) */
.profile-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 900;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.profile-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.profile-panel {
  position: fixed;
  top: var(--nav-height);
  right: 0;
  bottom: 0;
  width: 360px;
  max-width: 90vw;
  background: rgba(10, 12, 18, 0.98);
  backdrop-filter: blur(36px);
  border-left: 1px solid var(--border-medium);
  z-index: 950;
  transform: translateX(100%);
  transition: transform 0.3s var(--transition-spring);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.profile-panel.open {
  transform: translateX(0);
}

.panel-header {
  padding: 1.6rem;
  display: flex;
  gap: 16px;
  border-bottom: 1px solid var(--border-subtle);
}

.panel-avatar-lg {
  width: 70px;
  height: 70px;
  border-radius: 28px;
  background: var(--bg-surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  font-weight: 800;
  overflow: hidden;
}

.panel-close {
  position: absolute;
  top: 18px;
  right: 18px;
  background: var(--bg-surface);
  border: none;
  width: 34px;
  height: 34px;
  border-radius: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-secondary);
}

.panel-body {
  padding: 1.4rem;
}

.section {
  margin-bottom: 1.5rem;
}

.section-label {
  text-transform: uppercase;
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 8px;
}

/* mobile bottom sheet */
@media (max-width: 780px) {
  .app-shell {
    flex-direction: column;
  }
  
  .sidebar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: var(--mobile-sheet-height);
    border-right: none;
    border-top: 1px solid var(--border-medium);
    border-radius: 24px 24px 0 0;
    transform: translateY(0);
    z-index: 450;
    transition: height 0.2s;
    backdrop-filter: blur(32px);
  }
  
  .sidebar::before {
    content: '';
    width: 48px;
    height: 5px;
    background: var(--bg-surface-hover);
    border-radius: 4px;
    margin: 12px auto 4px;
    display: block;
  }
  
  .map-fab {
    bottom: calc(var(--mobile-sheet-height) + 0.8rem);
    right: 0.8rem;
  }
  
  .location-banner {
    bottom: calc(var(--mobile-sheet-height) + 1rem);
    white-space: normal;
    text-align: center;
    font-size: 0.7rem;
    padding: 0.5rem 1rem;
  }
  
  .profile-panel {
    width: 100%;
    border-radius: 24px 24px 0 0;
    top: auto;
    bottom: 0;
    height: 85vh;
    border-left: none;
    border-top: 1px solid var(--border-medium);
  }
  
  .profile-panel.open {
    transform: translateY(0);
  }
}

/* leaflet popup styling */
.leaflet-popup-content-wrapper {
  background: var(--bg-elevated) !important;
  border-radius: 20px !important;
  border: 1px solid var(--border-medium) !important;
  box-shadow: var(--shadow-md) !important;
}

.custom-popup {
  padding: 8px 12px;
}

/* marker pin custom */
.live-pin {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.pin-bubble {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 0.8rem;
  box-shadow: 0 4px 12px black;
  transition: transform 0.1s;
  background-size: cover;
}

.pin-me {
  border-color: var(--accent-green);
  box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.2);
}
</style>

</head>
<body>
<div class="app">
  <nav class="navbar">
    <div class="logo">
      <div class="logo-badge"></div>
      <span>NEARME</span>
    </div>
    <div class="nav-actions">
      <button class="icon-btn" id="recenterDesktopBtn">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
        <span class="recenter-text">Center</span>
      </button>
      <div class="avatar" id="userAvatarBtn">ME</div>
    </div>
  </nav>

  <div class="dropdown-menu" id="userDropdown">
    <button class="menu-item" id="editProfileBtn">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Edit profile
    </button>
    <div class="divider"></div>
    <button class="menu-item danger" id="logoutBtn">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </button>
  </div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="badge-title">● discover nearby</div>
        <div class="counter"><span id="nearbyCount">0</span> <small>people around</small></div>
        <div class="radius-control">
          <span>🔘 radius</span>
          <input type="range" id="radiusSlider" min="500" max="15000" step="500" value="5000">
          <span class="radius-value" id="radiusValue">5 km</span>
        </div>
      </div>
      <div class="user-list" id="userListContainer">
        <div class="empty-state" id="emptyNearby">
          <span>🧭</span>
          <p>Scanning for people near you...</p>
        </div>
      </div>
    </aside>

    <div class="map-wrap">
      <div id="map"></div>
      <div class="map-fab">
        <button class="fab-btn primary" id="locateFabBtn" aria-label="my location">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
        </button>
        <div class="fab-btn" id="zoomInBtn">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <div class="fab-btn" id="zoomOutBtn">
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
      </div>
      <div class="location-banner" id="locationBanner" style="display: none;">
        📍 Share your location to see who's nearby
        <button id="enableLocationBtn">Allow</button>
      </div>
    </div>
  </div>

  <div class="profile-overlay" id="profileOverlay"></div>
  <div class="profile-panel" id="profilePanel">
    <button class="panel-close" id="closeProfileBtn">✕</button>
    <div class="panel-header" id="profileHeader"></div>
    <div class="panel-body" id="profileBody"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ---------- MOCK DATA & REAL API HYBRID (works standalone but expects backend endpoints gracefully) ----------
let currentUser = null;
let userCoords = null;
let mapInstance = null;
let userMarker = null;
let radiusCircle = null;
let nearbyUsers = [];
let radiusMeters = 5000;
let markersMap = new Map();
let watchId = null;

// helper functions
function formatDistance(meters) {
  if (meters < 1000) return `${Math.round(meters)} m`;
  return `${(meters / 1000).toFixed(1)} km`;
}

function getRandomColor(seed) {
  const colors = ['#2ecc71', '#3b82f6', '#f97316', '#8b5cf6', '#ec489a', '#06b6d4'];
  let hash = 0;
  for(let i=0; i<seed.length; i++) hash = ((hash<<5)-hash)+seed.charCodeAt(i);
  return colors[Math.abs(hash % colors.length)];
}

function buildPinIcon(user, isMe = false) {
  const bgColor = isMe ? '#2ecc71' : getRandomColor(user._id || user.name);
  const initial = user?.name?.charAt(0)?.toUpperCase() || '?';
  const hasAvatar = user?.avatar && user.avatar !== 'null';
  const content = hasAvatar ? `<img src="${user.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>` : initial;
  const html = `<div class="live-pin"><div class="pin-bubble ${isMe ? 'pin-me' : ''}" style="background:${bgColor};">${content}</div><div style="width:2px;height:6px;background:#aaa;"></div></div>`;
  return L.divIcon({ html, className: '', iconSize: [44, 56], iconAnchor: [22, 52] });
}

function updateMarkers() {
  const toKeep = new Set(nearbyUsers.map(u => u._id));
  for(let [id, marker] of markersMap.entries()) {
    if(!toKeep.has(id)) { mapInstance.removeLayer(marker); markersMap.delete(id); }
  }
  nearbyUsers.forEach(user => {
    if(!user.location?.coordinates) return;
    const [lng, lat] = user.location.coordinates;
    if(markersMap.has(user._id)) {
      const marker = markersMap.get(user._id);
      marker.setLatLng([lat, lng]);
      marker.setIcon(buildPinIcon(user));
      marker.setPopupContent(createPopupContent(user));
    } else {
      const marker = L.marker([lat, lng], { icon: buildPinIcon(user) }).addTo(mapInstance);
      marker.bindPopup(createPopupContent(user));
      marker.on('click', () => openProfilePanel(user));
      markersMap.set(user._id, marker);
    }
  });
}

function createPopupContent(u) {
  return `<div class="custom-popup"><strong>${u.name || 'Anonymous'}</strong>${u.bio ? `<br/><span style="font-size:0.7rem;">${u.bio.substring(0,60)}</span>` : ''}</div>`;
}

function renderSidebar() {
  const container = document.getElementById('userListContainer');
  const emptyDiv = document.getElementById('emptyNearby');
  const countSpan = document.getElementById('nearbyCount');
  countSpan.innerText = nearbyUsers.length;
  document.getElementById('radiusValue').innerText = radiusMeters >= 1000 ? `${radiusMeters/1000} km` : `${radiusMeters} m`;
  
  const existing = container.querySelectorAll('.user-item:not(.empty-state)');
  existing.forEach(el => el.remove());
  
  if(nearbyUsers.length === 0) {
    emptyDiv.style.display = 'flex';
    return;
  }
  emptyDiv.style.display = 'none';
  
  nearbyUsers.forEach(u => {
    const shared = (currentUser?.interests || []).filter(t => (u.interests || []).includes(t));
    const dist = userCoords && u.location?.coordinates ? 
      mapInstance.distance([userCoords.lat, userCoords.lng], [u.location.coordinates[1], u.location.coordinates[0]]) : null;
    const bgColor = getRandomColor(u._id);
    const initials = (u.name || '?').slice(0,2).toUpperCase();
    const avatarHtml = u.avatar ? `<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;"/>` : initials;
    const onlineBadge = u.isOnline ? '<div class="online-indicator"></div>' : '';
    const tagsHtml = (u.interests || []).slice(0,3).map(t => `<span class="tag-pill ${shared.includes(t) ? 'shared' : ''}">${t}</span>`).join('');
    
    const div = document.createElement('div');
    div.className = 'user-item';
    div.innerHTML = `
      <div class="user-avatar" style="background:${bgColor};">
        ${avatarHtml}
        ${onlineBadge}
      </div>
      <div class="user-details">
        <div class="user-name">${u.name}</div>
        <div class="user-bio">${u.bio || (u.isOnline ? 'Online' : 'Away')}</div>
        ${tagsHtml ? `<div class="tags">${tagsHtml}</div>` : ''}
      </div>
      ${dist ? `<div class="distance">${formatDistance(dist)}</div>` : ''}
    `;
    div.addEventListener('click', () => {
      document.querySelectorAll('.user-item').forEach(el => el.classList.remove('highlighted'));
      div.classList.add('highlighted');
      openProfilePanel(u);
      if(u.location?.coordinates) {
        mapInstance.setView([u.location.coordinates[1], u.location.coordinates[0]], 14);
        markersMap.get(u._id)?.openPopup();
      }
    });
    container.appendChild(div);
  });
}

async function fetchNearby() {
  if(!userCoords) return;
  try {
    const res = await fetch(`/api/users/nearby?lat=${userCoords.lat}&lng=${userCoords.lng}&radius=${radiusMeters}&limit=50`);
    if(res.ok) {
      nearbyUsers = await res.json();
      updateMarkers();
      renderSidebar();
    } else {
      // fallback mock for demo (ensures ui works even without backend)
      if(nearbyUsers.length === 0) generateMockNearby();
      else { updateMarkers(); renderSidebar(); }
    }
  } catch(e) {
    generateMockNearby();
  }
}

function generateMockNearby() {
  if(!userCoords) return;
  const mockNames = ["Lena", "Marcus", "Sophia", "Eliot", "Zara", "Omar", "Clara"];
  nearbyUsers = mockNames.map((n, idx) => ({
    _id: `mock_${idx}`,
    name: n,
    bio: idx % 2 === 0 ? "Explorer & creative" : "Coffee lover",
    interests: idx % 3 === 0 ? ["design","tech"] : ["music","hiking"],
    isOnline: idx % 2 === 0,
    avatar: null,
    location: {
      type: "Point",
      coordinates: [userCoords.lng + (Math.random() - 0.5) * 0.03, userCoords.lat + (Math.random() - 0.5) * 0.03]
    }
  }));
  updateMarkers();
  renderSidebar();
}

function openProfilePanel(u) {
  const header = document.getElementById('profileHeader');
  const body = document.getElementById('profileBody');
  const shared = (currentUser?.interests || []).filter(t => (u.interests || []).includes(t));
  header.innerHTML = `
    <div class="panel-avatar-lg" style="background:${getRandomColor(u._id)};">${u.avatar ? `<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;"/>` : (u.name?.slice(0,2) || '?')}</div>
    <div><h3>${u.name}</h3><span style="font-size:0.7rem;color:var(--text-secondary);">${u.isOnline ? '🟢 Online' : 'offline'}</span></div>
  `;
  let tagsHtml = (u.interests || []).map(t => `<span class="tag-pill ${shared.includes(t) ? 'shared' : ''}">${t}</span>`).join('');
  body.innerHTML = `
    <div class="section"><div class="section-label">about</div><div>${u.bio || 'No bio yet'}</div></div>
    ${tagsHtml ? `<div class="section"><div class="section-label">interests</div><div class="tags">${tagsHtml}</div></div>` : ''}
  `;
  document.getElementById('profilePanel').classList.add('open');
  document.getElementById('profileOverlay').classList.add('visible');
}

function closeProfilePanel() {
  document.getElementById('profilePanel').classList.remove('open');
  document.getElementById('profileOverlay').classList.remove('visible');
}

function initMap(lat, lng) {
  mapInstance = L.map('map').setView([lat, lng], 14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { subdomains: 'abcd', maxZoom: 19 }).addTo(mapInstance);
  radiusCircle = L.circle([lat, lng], { radius: radiusMeters, color: '#2ecc71', weight: 1.2, fillOpacity: 0.05 }).addTo(mapInstance);
  userMarker = L.marker([lat, lng], { icon: buildPinIcon({ name: currentUser?.name || 'You' }, true) }).addTo(mapInstance);
  userMarker.bindPopup('<div><strong>You are here</strong></div>');
}

function updateMyLocation(position) {
  const { latitude, longitude } = position.coords;
  userCoords = { lat: latitude, lng: longitude };
  if(!mapInstance) initMap(latitude, longitude);
  else {
    userMarker.setLatLng([latitude, longitude]);
    radiusCircle.setLatLng([latitude, longitude]);
    mapInstance.setView([latitude, longitude], mapInstance.getZoom());
  }
  radiusCircle.setRadius(radiusMeters);
  fetchNearby();
  document.getElementById('locationBanner').style.display = 'none';
}

function locationError() {
  document.getElementById('locationBanner').style.display = 'flex';
  if(!mapInstance) initMap(48.8566, 2.3522);
}

function startGeolocation() {
  if(!navigator.geolocation) { locationError(); return; }
  watchId = navigator.geolocation.watchPosition(updateMyLocation, locationError, { enableHighAccuracy: true, maximumAge: 10000, timeout: 15000 });
}

// Radius slider events
const radiusSlider = document.getElementById('radiusSlider');
radiusSlider.addEventListener('input', (e) => {
  radiusMeters = parseInt(e.target.value);
  document.getElementById('radiusValue').innerText = radiusMeters >= 1000 ? `${radiusMeters/1000} km` : `${radiusMeters} m`;
  if(radiusCircle) radiusCircle.setRadius(radiusMeters);
  clearTimeout(window.radiusDebounce);
  window.radiusDebounce = setTimeout(() => fetchNearby(), 400);
});

// UI buttons
document.getElementById('recenterDesktopBtn').addEventListener('click', () => { if(userCoords) mapInstance.setView([userCoords.lat, userCoords.lng], 14); });
document.getElementById('locateFabBtn').addEventListener('click', () => { if(userCoords) mapInstance.setView([userCoords.lat, userCoords.lng], 15); });
document.getElementById('zoomInBtn').addEventListener('click', () => mapInstance.zoomIn());
document.getElementById('zoomOutBtn').addEventListener('click', () => mapInstance.zoomOut());
document.getElementById('enableLocationBtn').addEventListener('click', startGeolocation);
document.getElementById('userAvatarBtn').addEventListener('click', (e) => { e.stopPropagation(); document.getElementById('userDropdown').classList.toggle('open'); });
document.getElementById('closeProfileBtn').addEventListener('click', closeProfilePanel);
document.getElementById('profileOverlay').addEventListener('click', closeProfilePanel);
document.getElementById('logoutBtn').addEventListener('click', () => { fetch('/auth/logout', {method:'POST'}).catch(()=>{}); location.href='/'; });
document.getElementById('editProfileBtn').addEventListener('click', () => { location.href = '/onboarding'; });

document.addEventListener('click', (e) => { if(!e.target.closest('#userAvatarBtn') && !e.target.closest('#userDropdown')) document.getElementById('userDropdown').classList.remove('open'); });

async function loadUser() {
  try {
    const res = await fetch('/auth/me');
    if(res.ok) {
      currentUser = await res.json();
      const avatarEl = document.getElementById('userAvatarBtn');
      if(currentUser.avatar) avatarEl.innerHTML = `<img src="${currentUser.avatar}" alt="avatar"/>`;
      else avatarEl.innerText = (currentUser.name?.slice(0,2) || 'ME').toUpperCase();
    }
  } catch(e) { currentUser = { name: 'Explorer', interests: ['tech','art'] }; }
  startGeolocation();
}

loadUser();
setInterval(() => { if(userCoords) fetchNearby(); }, 25000);
window.addEventListener('resize', () => { if(mapInstance) setTimeout(() => mapInstance.invalidateSize(), 100); });
</script>
</body>
</html>
