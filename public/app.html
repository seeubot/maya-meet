<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>NearMe — Discover Your Circle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    /* ── Design Tokens ── */
    :root {
      --bg-main: #0f1115;
      --bg-card: rgba(23, 25, 31, 0.85);
      --bg-hover: rgba(45, 48, 58, 0.6);
      --accent: #6366f1; /* Indigo */
      --accent-glow: rgba(99, 102, 241, 0.4);
      --text-pri: #f8fafc;
      --text-sec: #94a3b8;
      --text-faint: #64748b;
      --border: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.1);
      --sidebar-w: 360px;
      --nav-h: 68px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-main);
      color: var(--text-pri);
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    h1, h2, h3, .logo { font-family: 'Outfit', sans-serif; }

    /* ── Nav ── */
    nav {
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      background: rgba(15, 17, 21, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-pri);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo span { color: var(--accent); }

    .nav-actions { display: flex; align-items: center; gap: 1rem; }

    .btn-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-sec);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.2s;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--text-pri); background: var(--bg-hover); }

    .user-pill {
      height: 40px;
      padding: 0 4px 0 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: 0.2s;
    }
    .user-pill:hover { border-color: var(--accent); }
    .user-pill-name { font-size: 0.85rem; font-weight: 500; color: var(--text-pri); }
    .user-pill-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 600;
      overflow: hidden;
    }

    /* ── App Layout ── */
    .app-main {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg-main);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 900;
    }

    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 1.5rem;
    }
    .stat-label { font-size: 0.75rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--text-pri); line-height: 1; }
    .stat-unit { font-size: 0.9rem; color: var(--text-sec); font-weight: 400; margin-left: 4px; }

    .control-group {
      background: var(--bg-card);
      padding: 1rem;
      border-radius: 16px;
      border: 1px solid var(--border);
    }
    .control-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .control-label { font-size: 0.8rem; color: var(--text-sec); }
    .control-value { font-size: 0.8rem; color: var(--accent); font-weight: 600; }

    input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      background: var(--border);
      border-radius: 2px;
      accent-color: var(--accent);
    }

    /* ── User List ── */
    .user-list {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    .user-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      display: flex;
      gap: 12px;
      cursor: pointer;
      transition: 0.25s;
    }
    .user-card:hover { 
      background: var(--bg-hover);
      transform: translateY(-2px);
    }

    .card-avatar {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; color: white;
      flex-shrink: 0;
    }

    .card-content { flex: 1; min-width: 0; }
    .card-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; color: var(--text-pri); }
    .card-bio { font-size: 0.8rem; color: var(--text-sec); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .tag-container { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .mini-tag {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      color: var(--text-faint);
      border: 1px solid var(--border);
    }

    .card-dist { font-size: 0.75rem; color: var(--text-faint); font-weight: 500; }

    /* ── Map ── */
    .map-container {
      flex: 1;
      position: relative;
    }
    #map { width: 100%; height: 100%; background: #0b0c10; }

    /* Custom Map Controls Overlay */
    .map-overlay-tools {
      position: absolute;
      top: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 10px;
      z-index: 800;
    }

    /* ── Hide Leaflet Credit ── */
    .leaflet-control-attribution { display: none !important; }

    /* ── Custom Marker ── */
    .custom-marker {
      position: relative;
      width: 44px; height: 44px;
    }
    .marker-inner {
      width: 100%; height: 100%;
      border-radius: 16px;
      border: 2.5px solid white;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      transform: rotate(-45deg);
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    .marker-inner span { 
      transform: rotate(45deg); 
      color: white; font-weight: 700; font-size: 14px; 
    }

    /* Permission Banner */
    #loc-gate {
      position: absolute; 
      inset: 0; 
      background: rgba(15,17,21,0.85); 
      z-index: 1100; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      backdrop-filter: blur(12px);
    }
    .gate-card {
      max-width: 340px; 
      text-align: center; 
      background: var(--bg-card); 
      padding: 2.5rem; 
      border-radius: 28px; 
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    @media (max-width: 800px) {
      .sidebar {
        position: absolute; bottom: 0; left: 0; right: 0;
        width: 100%; height: 40vh;
        border-right: none; border-top: 1px solid var(--border);
        background: rgba(15,17,21,0.95);
      }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="logo" onclick="location.reload()">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
      Near<span>Me</span>
    </a>
    
    <div class="nav-actions">
      <button class="btn-icon" id="btn-recenter" title="Recenter Map">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
      </button>
      <div class="user-pill">
        <span class="user-pill-name">You</span>
        <div class="user-pill-avatar">ME</div>
      </div>
    </div>
  </nav>

  <main class="app-main">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="stats-row">
          <div>
            <div class="stat-label">Active Nearby</div>
            <div class="stat-value" id="nearby-count">0<span class="stat-unit">People</span></div>
          </div>
        </div>

        <div class="control-group">
          <div class="control-header">
            <span class="control-label">Search Radius</span>
            <span class="control-value" id="radius-text">5.0 km</span>
          </div>
          <input type="range" id="radius-slider" min="0.5" max="25" step="0.5" value="5">
        </div>
      </div>

      <div class="user-list" id="user-list"></div>
    </aside>

    <div class="map-container">
      <div id="map"></div>
      
      <div class="map-overlay-tools">
        <button class="btn-icon" id="zoom-in">+</button>
        <button class="btn-icon" id="zoom-out">−</button>
      </div>
      
      <div id="loc-gate">
        <div class="gate-card">
           <div style="width:64px; height:64px; background:var(--accent-glow); border-radius:20px; display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; color:var(--accent);">
             <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
           </div>
           <h3 style="margin-bottom:0.5rem;">Find Your Circle</h3>
           <p style="font-size:0.9rem; color:var(--text-sec); margin-bottom:1.5rem;">To see people around you, we need your location. Or try the demo mode below.</p>
           <button id="grant-btn" style="width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:14px; font-weight:600; cursor:pointer; margin-bottom: 0.75rem;">Enable GPS</button>
           <button id="demo-btn" style="width:100%; padding:14px; background:transparent; color:var(--text-sec); border:1px solid var(--border); border-radius:14px; font-weight:500; cursor:pointer;">Try Demo Mode</button>
        </div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let map, myCircle, userMarkers = new Map();
    let myPos = null;
    let radius = 5;
    let users = [];

    window.onload = () => {
      initMap();
      setupUI();
    };

    function initMap() {
      map = L.map('map', { zoomControl: false, attributionControl: false, center: [37.7749, -122.4194], zoom: 13 });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    }

    function setupUI() {
      const slider = document.getElementById('radius-slider');
      slider.oninput = (e) => {
        radius = parseFloat(e.target.value);
        document.getElementById('radius-text').innerText = radius.toFixed(1) + ' km';
        if (myCircle) myCircle.setRadius(radius * 1000);
        renderList();
        updateMarkers();
      };

      document.getElementById('zoom-in').onclick = () => map.zoomIn();
      document.getElementById('zoom-out').onclick = () => map.zoomOut();
      document.getElementById('btn-recenter').onclick = () => myPos && map.panTo(myPos);
      document.getElementById('grant-btn').onclick = requestLocation;
      document.getElementById('demo-btn').onclick = () => useLocation(37.7749, -122.4194);
    }

    function requestLocation() {
      if (!navigator.geolocation) {
        useLocation(37.7749, -122.4194);
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => useLocation(pos.coords.latitude, pos.coords.longitude),
        () => useLocation(37.7749, -122.4194)
      );
    }

    function useLocation(lat, lng) {
      document.getElementById('loc-gate').style.display = 'none';
      myPos = { lat, lng };
      map.setView(myPos, 14);
      
      if (myCircle) map.removeLayer(myCircle);
      myCircle = L.circle(myPos, {
        radius: radius * 1000,
        color: 'rgba(99, 102, 241, 0.4)',
        fillColor: 'rgba(99, 102, 241, 0.05)',
        weight: 1
      }).addTo(map);

      L.marker(myPos, {
        icon: L.divIcon({
          className: '',
          html: `<div class="custom-marker"><div class="marker-inner" style="background:#fff; border-color:var(--accent)"><span style="color:var(--accent)">ME</span></div></div>`,
          iconSize: [44, 44], iconAnchor: [22, 44]
        })
      }).addTo(map);

      generateMockUsers();
    }

    function generateMockUsers() {
      const names = ["Alex", "Sarah", "Jordan", "Taylor", "Casey", "Morgan", "Riley"];
      const bios = ["Loves hiking and tech", "Digital Nomad", "Coffee enthusiast", "UI Designer", "Music producer", "Vlogger", "Casual gamer"];
      users = names.map((name, i) => {
        const uLat = myPos.lat + (Math.random() - 0.5) * 0.1;
        const uLng = myPos.lng + (Math.random() - 0.5) * 0.1;
        return {
          id: i,
          name,
          bio: bios[i % bios.length],
          lat: uLat,
          lng: uLng,
          dist: calculateDist(myPos.lat, myPos.lng, uLat, uLng)
        };
      });
      renderList();
      updateMarkers();
    }

    function calculateDist(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2-lat1) * Math.PI/180;
      const dLon = (lon2-lon1) * Math.PI/180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function renderList() {
      const filtered = users.filter(u => u.dist <= radius).sort((a,b) => a.dist - b.dist);
      document.getElementById('nearby-count').innerHTML = `${filtered.length}<span class="stat-unit">People</span>`;
      document.getElementById('user-list').innerHTML = filtered.map(u => `
        <div class="user-card" onclick="map.flyTo([${u.lat}, ${u.lng}], 15)">
          <div class="card-avatar">${u.name[0]}</div>
          <div class="card-content">
            <div class="card-name">${u.name}</div>
            <div class="card-bio">${u.bio}</div>
          </div>
          <div class="card-dist">${u.dist.toFixed(1)}km</div>
        </div>
      `).join('');
    }

    function updateMarkers() {
      userMarkers.forEach(m => map.removeLayer(m));
      userMarkers.clear();
      users.forEach(u => {
        if (u.dist > radius) return;
        const m = L.marker([u.lat, u.lng], {
          icon: L.divIcon({
            className: '',
            html: `<div class="custom-marker"><div class="marker-inner"><span>${u.name[0]}</span></div></div>`,
            iconSize: [44, 44], iconAnchor: [22, 44]
          })
        }).addTo(map);
        userMarkers.set(u.id, m);
      });
    }
  </script>
</body>
</html>
