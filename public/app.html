<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>NearMe — Immersive Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --primary: #007AFF; /* Apple-style Blue */
    --accent: #34C759; /* Success Green */
    --bg-glass: rgba(255, 255, 255, 0.85);
    --bg-dark-glass: rgba(28, 28, 30, 0.85);
    --border-glass: rgba(255, 255, 255, 0.3);
    --shadow-soft: 0 8px 32px rgba(0,0,0,0.12);
    --text-main: #1C1C1E;
    --text-muted: #8E8E93;
    --safe-top: env(safe-area-inset-top);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #f2f2f7;
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Immersive Map Container ── */
  .map-container {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1;
  }

  #map { width: 100%; height: 100%; z-index: 1; }

  /* Hide Leaflet Branding & Clutter */
  .leaflet-control-attribution { display: none !important; }
  .leaflet-control-zoom { display: none !important; }
  .leaflet-top, .leaflet-bottom { z-index: 10 !important; }

  /* ── Floating Header ── */
  .floating-nav {
    position: absolute;
    top: calc(1rem + var(--safe-top));
    left: 1rem;
    right: 1rem;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
  }

  .nav-group {
    display: flex;
    gap: 10px;
    pointer-events: auto;
  }

  .glass-card {
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-glass);
    border-radius: 16px;
    box-shadow: var(--shadow-soft);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
    color: var(--text-main);
    text-decoration: none;
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--primary); }

  .btn-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    border: none;
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: 0.2s;
    box-shadow: var(--shadow-soft);
    pointer-events: auto;
  }
  .btn-icon:active { transform: scale(0.95); background: rgba(255,255,255,1); }
  .btn-icon svg { width: 20px; height: 20px; stroke: var(--text-main); fill: none; stroke-width: 2; }

  /* ── Action Sidebar (The Drawer) ── */
  .drawer {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 360px;
    z-index: 200;
    background: var(--bg-glass);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-right: 1px solid var(--border-glass);
    transform: translateX(-100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    flex-direction: column;
    padding-top: calc(5rem + var(--safe-top));
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 0 24px 20px;
  }
  .drawer-title {
    font-family: 'Outfit', sans-serif;
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .drawer-subtitle {
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  .radius-pill {
    background: rgba(0,0,0,0.05);
    border-radius: 12px;
    padding: 12px;
    margin: 10px 24px;
  }
  .radius-header {
    display: flex; justify-content: space-between;
    font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 8px;
  }
  input[type="range"] {
    width: 100%; height: 4px;
    accent-color: var(--primary);
  }

  .user-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px;
  }

  .user-card {
    background: rgba(255,255,255,0.4);
    border-radius: 14px;
    padding: 12px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid transparent;
  }
  .user-card:hover { background: rgba(255,255,255,0.8); border-color: var(--border-glass); }

  .avatar {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--primary);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .online-status {
    position: absolute; top: -2px; right: -2px;
    width: 10px; height: 10px;
    border-radius: 50%; background: var(--accent);
    border: 2px solid white;
  }

  .user-details { flex: 1; min-width: 0; }
  .u-name { font-weight: 600; font-size: 0.95rem; display: block; }
  .u-bio { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Map HUD (Heads Up Display) ── */
  .map-hud {
    position: absolute;
    bottom: 2rem; right: 1rem;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── Custom Map Pins ── */
  .custom-marker {
    background: var(--primary);
    width: 42px; height: 42px;
    border-radius: 14px 14px 14px 4px;
    transform: rotate(-45deg);
    border: 3px solid white;
    box-shadow: 0 8px 16px rgba(0,122,255,0.3);
    display: flex; align-items: center; justify-content: center;
  }
  .marker-content {
    transform: rotate(45deg);
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 600; font-size: 10px;
  }

  /* Responsive Adjustments */
  @media (max-width: 600px) {
    .drawer {
      width: 100%;
      height: 70vh;
      bottom: 0; top: auto;
      border-radius: 24px 24px 0 0;
      transform: translateY(100%);
      padding-top: 2rem;
    }
    .drawer.open { transform: translateY(0); }
  }
</style>
</head>
<body>

  <!-- Floating Navigation -->
  <div class="floating-nav">
    <div class="nav-group">
      <button class="btn-icon" id="toggle-drawer" title="Toggle List">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="glass-card">
        <a href="#" class="logo">Near<span>Me</span></a>
      </div>
    </div>
    
    <div class="nav-group">
      <button class="btn-icon" id="btn-recenter" title="Recenter">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      </button>
      <div class="avatar" style="width: 40px; height: 40px; border-radius: 12px;" id="profile-trigger">JD</div>
    </div>
  </div>

  <!-- Main Map -->
  <div class="map-container">
    <div id="map"></div>
  </div>

  <!-- Zoom Controls HUD -->
  <div class="map-hud">
    <button class="btn-icon" onclick="map.zoomIn()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    <button class="btn-icon" onclick="map.zoomOut()"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
  </div>

  <!-- People Sidebar / Drawer -->
  <div class="drawer" id="sidebar-drawer">
    <div class="drawer-header">
      <h2 class="drawer-title">Discovery</h2>
      <p class="drawer-subtitle">Finding people around you</p>
    </div>

    <div class="radius-pill">
      <div class="radius-header">
        <span>Range</span>
        <span id="radius-val">5 km</span>
      </div>
      <input type="range" id="radius-slider" min="1" max="20" value="5">
    </div>

    <div class="user-list" id="user-list">
      <!-- Users populated by JS -->
      <div class="user-card">
        <div class="avatar">AS <div class="online-status"></div></div>
        <div class="user-details">
          <span class="u-name">Alex Smith</span>
          <span class="u-bio">Coffee enthusiast & UI Designer</span>
        </div>
      </div>
    </div>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  let map;
  let drawerOpen = false;
  const sidebar = document.getElementById('sidebar-drawer');
  const toggleBtn = document.getElementById('toggle-drawer');

  // Initialize Immersive Map
  function initMap() {
    // Hidden attribution is set via CSS, but clean up UI options here
    map = L.map('map', {
      center: [40.7128, -74.0060], // Default New York
      zoom: 13,
      zoomControl: false,
      attributionControl: false
    });

    // Modern "Positron" style map
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 20
    }).addTo(map);

    // Custom Marker Example
    const customIcon = L.divIcon({
      className: '',
      html: `<div class="custom-marker"><div class="marker-content">AS</div></div>`,
      iconSize: [42, 42],
      iconAnchor: [4, 42]
    });

    L.marker([40.7128, -74.0060], { icon: customIcon }).addTo(map)
      .bindPopup("<b>Alex Smith</b><br>Active 2m ago");
  }

  // UI Interactivity
  toggleBtn.addEventListener('click', () => {
    drawerOpen = !drawerOpen;
    sidebar.classList.toggle('open', drawerOpen);
    // Update button icon or style if needed
    toggleBtn.style.background = drawerOpen ? 'var(--primary)' : 'var(--bg-glass)';
    toggleBtn.querySelector('svg').style.stroke = drawerOpen ? '#fff' : 'var(--text-main)';
  });

  document.getElementById('radius-slider').addEventListener('input', (e) => {
    document.getElementById('radius-val').innerText = e.target.value + ' km';
  });

  window.onload = initMap;
</script>
</body>
</html>
